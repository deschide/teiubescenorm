<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentru tine ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ecb,#ffd6e8);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
max-width:420px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.2);
position:relative;
z-index:2;
}

h1{
color:#ff2d75;
margin-bottom:20px;
}

p{
font-size:20px;
color:#444;
line-height:1.6;
margin-bottom:20px;
}

img{
width:100%;
border-radius:18px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

.heart{
position:fixed;
top:-50px;
color:#ff2d75;
animation:fall linear infinite;
user-select:none;
z-index:1;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="card">

<h1>❤️ Pentru tine ❤️</h1>

<p>
Dacă ai deschis acest link, înseamnă că vreau să-ți amintesc cât de mult însemni pentru mine. ❤️
</p>

<img src="6DA4F7AF-4240-4504-9B45-4A1AE7505013" alt="Noi">

</div>

<script>

for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*25)+"px";

heart.style.animationDuration=(4+Math.random()*6)+"s";

heart.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
