<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentru tine ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ecb,#ffd6e8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:25px;
max-width:430px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.2);
z-index:2;
}

button{
background:#ff2d75;
color:white;
padding:16px 35px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#surpriza{
display:none;
}

h1{
color:#ff2d75;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.7;
margin-bottom:20px;
}

img{
width:100%;
border-radius:20px;
margin-top:15px;
}

.heart{
position:fixed;
top:-50px;
font-size:24px;
animation:fall linear infinite;
user-select:none;
pointer-events:none;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="card">

<div id="start">

<h2>❤️ O surpriză pentru tine ❤️</h2>

<br>

<button onclick="deschide()">
Apasă aici ❤️
</button>

</div>

<div id="surpriza">

<h1>❤️ Pentru tine ❤️</h1>

<p>
Dacă ai deschis acest link, înseamnă că vreau să-ți amintesc cât de mult însemni pentru mine. ❤️
</p>

<img src="6DA4F7AF-4240-4504-9B45-4A1AE7505013.jpeg">

</div>

</div>

<script>

function deschide(){

document.getElementById("start").style.display="none";

document.getElementById("surpriza").style.display="block";

ploaie();

}

function ploaie(){

for(let i=0;i<80;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDuration=(3+Math.random()*5)+"s";

h.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(h);

}

}

</script>

</body>
</html>
